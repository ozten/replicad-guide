# Freshness gate (R9/R15): re-runs EVERY example against the pinned replicad
# ref (vendor/replicad submodule) — an example that stops rendering fails the
# build, naming the example — and regenerates all full-reference signatures
# from the pinned source. Bumping the pinned ref re-runs everything, so drift
# from replicad is caught loudly, never silently. check-examples never uses
# the incremental render cache (and CI starts with an empty generated/
# anyway), so the gate cannot be satisfied by stale artifacts.
#
# The shuffled-order leakage check runs on every build (two fresh-process
# renders, ~35s). The 300-example RSS scale gate (check:scale) is heavier
# and runs on workflow_dispatch only.
name: build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Memory budget: GitHub-hosted Linux runners have ~7GB RAM. The
    # OpenCascade WASM heap lives outside Node's JS heap, so
    # --max-old-space-size does not bound it — the example checks run under
    # --expose-gc so the render engine's periodic global.gc() actually frees
    # OCCT objects instead of being a silent no-op.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vendor/replicad/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install + build the pinned replicad packages
        run: pnpm run setup

      - name: Install guide dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm vitest run

      - name: Re-run every example against the pinned ref
        run: pnpm run check:examples

      - name: Shuffled-order leakage check
        run: pnpm run check:order

      - name: Full-reference scale gate (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm run check:scale

      - name: Build site (render + generate:api + astro build)
        run: pnpm run build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Publishes the freshly gated build to GitHub Pages
  # (https://ozten.github.io/replicad-guide/). Only main-branch pushes and
  # manual runs deploy; PRs stop at the gates above.
  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Enable and configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
